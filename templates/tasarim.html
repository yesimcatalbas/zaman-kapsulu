<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ veri.tam_tarih }} - Zaman Arşivi</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f4efe2; /* Nostaljik gazete kağıdı rengi */
            color: #2c2519;
            margin: 0;
            padding: 40px 20px;
            display: block;
        }
        .kapsul {
            max-width: 700px;
            margin: auto;
            border: 2px solid #4a3e2b;
            padding: 30px;
            background: #fcf9f2;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }
        .ust-baslik {
            text-align: center;
            border-bottom: 4px double #4a3e2b;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .ust-baslik h1 {
            font-size: 36px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .tarih-etiketi {
            font-weight: bold;
            font-size: 18px;
            color: #7c2d12;
            margin-top: 5px;
        }
        .haber-icerik {
            line-height: 1.8;
            font-size: 18px;
            text-align: justify;
            text-indent: 30px;
        }
        .alt-menu {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid #4a3e2b;
            padding-top: 20px;
        }
        .btn-geri {
            display: inline-block;
            padding: 10px 20px;
            background: #4a3e2b;
            color: #f4efe2;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-geri:hover {
            background: #2c2519;
        }
    </style>
</head>
<body>

    <div class="kapsul">
        <div class="ust-baslik">
            <h1>DİJİTAL ZAMAN GAZETESİ</h1>
            <div class="tarih-etiketi">🗓️ Tarih: {{ veri.tam_tarih }}</div>
        </div>

        <h3>📰 GÜNÜN EN BÜYÜK GELİŞMESİ (Yıl: {{ veri.yil }})</h3>
        
        <div class="haber-icerik">
            {{ veri.olay }}
        </div>

        <div class="alt-menu">
            <a href="/" class="btn-geri">⬅️ Yeni Bir Tarihe Git</a>
        </div>
    </div>

</body>
</html>
