
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ veri.tam_tarih }} - Zaman Arşivi</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; /* Daktilo esintisi */
            background: linear-gradient(135deg, #2c1a04 0%, #0f172a 100%); /* Dinamik ve derin arka plan */
            color: #f8fafc;
            margin: 0;
            padding: 50px 20px;
            display: block;
        }
        .kapsul {
            max-width: 750px;
            margin: auto;
            border: 3px solid #e2b007; /* Altın sarısı çerçeve */
            padding: 40px;
            background-color: #fffaf0; /* Canlı parşömen rengi */
            color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(139, 92, 26, 0.2);
        }
        .ust-baslik {
            text-align: center;
            border-bottom: 5px double #e2b007;
            padding-bottom: 20px;
            margin-bottom: 35px;
        }
        .ust-baslik h1 {
            font-family: 'Georgia', serif;
            font-size: 40px;
            margin: 0;
            color: #7c2d12; /* Canlı kiremit rengi */
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .tarih-etiketi {
            font-weight: bold;
            font-size: 20px;
            color: #0284c7; /* Canlı mavi vurgu */
            margin-top: 10px;
            background: #e0f2fe;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }
        h3 {
            font-family: 'Georgia', serif;
            color: #b45309;
            border-left: 5px solid #b45309;
            padding-left: 10px;
        }
        /* Gazete Alıntı Kupürü */
        .gazete-kupuru {
            background: #f3eae1;
            border-right: 4px solid #b45309;
            border-left: 4px solid #b45309;
            padding: 25px;
            margin: 25px 0;
            font-style: italic;
            font-size: 19px;
            line-height: 1.8;
            text-align: justify;
            color: #451a03;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
            position: relative;
        }
        .alt-menu {
            margin-top: 40px;
            text-align: center;
        }
        .btn-geri {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 15px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-geri:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.6);
        }
    </style>
</head>
<body>

    <div class="kapsul">
        <div class="ust-baslik">
            <h1>🗞️ DİJİTAL ZAMAN ARŞİVİ</h1>
            <div class="tarih-etiketi">⏳ Hedef Tarih: {{ veri.tam_tarih }}</div>
        </div>

        <h3>📌 DÖNEMİN RADYO VE BASIN ALINTISI (Yıl: {{ veri.yil }})</h3>
        
        <div class="gazete-kupuru">
    “{{ veri.alinti_metni }}”
    
    <div style="text-align: right; margin-top: 15px; font-size: 14px; color: #78350f; font-weight: bold;">
        ✍️ {{ veri.muhabir }} | 📜 {{ veri.kod }}
    </div>
</div>

</body>
</html>
