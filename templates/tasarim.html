<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ veri.tam_tarih }} Tarihli Zaman Arşivi</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #2c1a04 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .kapsul {
            max-width: 650px;
            width: 100%;
            border: 3px solid #e2b007;
            padding: 40px;
            background-color: #fffaf0;
            color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .ust-baslik {
            border-bottom: 5px double #e2b007;
            padding-bottom: 20px;
            margin-bottom: 35px;
        }
        .ust-baslik h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            margin: 0;
            color: #7c2d12;
        }
        .olay-icerik {
            background: #f3eae1;
            border-left: 5px solid #b45309;
            padding: 25px;
            line-height: 1.8;
            font-size: 18px;
            text-align: justify;
            border-radius: 0 8px 8px 0;
            margin-bottom: 35px;
        }
        .olay-yili {
            font-weight: bold;
            color: #b45309;
            font-size: 20px;
            display: block;
            margin-bottom: 10px;
            font-family: 'Georgia', serif;
        }
        .btn-geri {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 15px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>
<body>

    <div class="kapsul">
        <div class="ust-baslik">
            <h1>📅 {{ veri.tam_tarih }} Tarihinde Yaşanmış Olay</h1>
        </div>

        <div class="olay-icerik">
            <span class="olay-yili">📍 Yıl: {{ veri.olay_yili }}</span>
            {{ veri.metin }}
        </div>

        <div class="alt-menu">
            <a href="/" class="btn-geri">🔄 Zaman Makinesini Yeniden Ayarla</a>
        </div>
    </div>

</body>
</html>
