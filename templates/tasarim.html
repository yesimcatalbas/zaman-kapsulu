<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ veri.tam_tarih }} Tarihli Zaman Arşivi</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #2c1a04 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 50px 20px;
            display: block;
        }
        .kapsul {
            max-width: 750px;
            margin: auto;
            border: 3px solid #e2b007;
            padding: 40px;
            background-color: #fffaf0;
            color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .ust-baslik {
            text-align: center;
            border-bottom: 5px double #e2b007;
            padding-bottom: 20px;
            margin-bottom: 35px;
        }
        .ust-baslik h1 {
            font-family: 'Georgia', serif;
            font-size: 36px;
            margin: 0;
            color: #7c2d12;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .olay-listesi {
            margin-top: 20px;
        }
        /* Her bir gazete maddesi/olay kutusu */
        .gazete-maddesi {
            background: #f3eae1;
            border-left: 5px solid #b45309;
            padding: 20px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 17px;
            text-align: justify;
            border-radius: 0 8px 8px 0;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
        }
        .olay-yili {
            font-weight: bold;
            color: #b45309;
            font-size: 19px;
            display: block;
            margin-bottom: 5px;
            font-family: 'Georgia', serif;
        }
        .alt-menu {
            margin-top: 40px;
            text-align: center;
        }
        .btn-geri {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 15px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }
    </style>
</head>
<body>

    <div class="kapsul">
        <div class="ust-baslik">
            <h1>📅 {{ veri.tam_tarih }} TARİHİNDE YAŞANAN OLAYLAR</h1>
        </div>

        <div class="olay-listesi">
            {% for olay in veri.olaylar %}
            <div class="gazete-maddesi">
                <span class="olay-yili">📍 Yıl: {{ olay.yil }}</span>
                {{ olay.metin }}
            </div>
            {% endfor %}
        </div>

        <div class="alt-menu">
            <a href="/" class="btn-geri">🔄 Zaman Makinesini Yeniden Ayarla</a>
        </div>
    </div>

</body>
</html>
