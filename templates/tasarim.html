<!DOCTYPE html>
<html>
<head>
    <title>Olaylar - Zaman Kapsülü</title>
    <style>
        body { font-family: Arial; padding: 30px; background: #fafafa; }
        .kapsul { background: white; padding: 20px; border-radius: 12px; max-width: 700px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .olay { border-left: 4px solid #2c3e66; margin: 15px 0; padding: 10px 20px; background: #f9f9ff; }
        .baslik { font-weight: bold; font-size: 1.2em; }
        .aciklama { color: #555; }
        .geri { display: inline-block; margin-top: 20px; color: #2c3e66; text-decoration: none; }
    </style>
</head>
<body>
    <div class="kapsul">
        <h2>📆 Tarih: {{ veri.tam_tarih }}</h2>
        <p>{{ veri.mesaj }}</p>

        {% if veri.olaylar %}
            {% for olay in veri.olaylar %}
            <div class="olay">
                <div class="baslik">✨ {{ olay.baslik }}</div>
                <div class="aciklama">{{ olay.aciklama }}</div>
            </div>
            {% endfor %}
        {% else %}
            <p>⚠️ Bu tarihte kayıtlı bir olay yok.</p>
        {% endif %}

        <a href="/" class="geri">← Başka tarih sorgula</a>
    </div>
</body>
</html>
