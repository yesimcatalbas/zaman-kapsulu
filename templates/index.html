
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Kapsülü - Zaman Makinesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: block;
            text-align: center;
            margin: 0;
            padding: 100px 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0284c7;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0369a1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⏳ Web Kapsülü</h1>
        <p>Girmek istediğiniz tarihi seçin ve internetin o günkü hafızasına doğru zaman yolculuğuna çıkın!</p>
        
        <form action="/" method="POST">
            <input type="date" name="tarih_girdisi" required>
            <button type="submit">Zaman Kapsülünü Aç</button>
        </form>
    </div>

</body>
</html>
